components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Identificador numerico del recurso.
      schema:
        type: integer
        example: 1

  responses:
    BadRequest:
      description: Solicitud invalida o datos obligatorios faltantes.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Faltan campos obligatorios
    Unauthorized:
      description: Credenciales invalidas.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Contrasena Incorrecta
    MissingToken:
      description: No se envio token de autenticacion.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Necesitas iniciar sesion para acceder
    Forbidden:
      description: Token invalido, expirado o rol no autorizado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            tokenExpirado:
              value:
                error: Tu sesion expiro. por favor inicia sesion nuevamente.
            rolNoAutorizado:
              value:
                Error: "esta funcion es solo para: Productor"
    NotFound:
      description: Recurso no encontrado o sin permisos sobre el recurso.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Recurso no encontrado
    InternalServerError:
      description: Error interno del servidor.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Error interno del servidor

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        error:
          type: string
          example: Mensaje de error

    MensajeResponse:
      type: object
      properties:
        mensaje:
          type: string
          example: Operacion realizada correctamente

    RolUsuario:
      type: string
      enum:
        - Productor
        - Comprador
        - Administrador
      example: Comprador

    CategoriaProducto:
      type: string
      enum:
        - Hortalizas
        - Granos Basicos
        - Frutas
        - Hierbas
        - Otros
      example: Hortalizas

    EstadoProducto:
      type: string
      enum:
        - Disponible
        - Reservado
        - Cerrado
      example: Disponible

    EstadoPedido:
      type: string
      enum:
        - Pendiente
        - Aceptado
        - Rechazado
        - Cancelado
        - Finalizado
      example: Pendiente

    EstadoEntrega:
      type: string
      enum:
        - Pendiente
        - Confirmado_Productor
        - Finalizado
      example: Pendiente

    RegistroRequest:
      type: object
      required:
        - nombre
        - telefono
        - tipo
        - contrasena
      properties:
        nombre:
          type: string
          example: Juan Perez
        telefono:
          type: string
          example: "55551234"
        tipo:
          type: string
          enum:
            - Productor
            - Comprador
          example: Productor
        contrasena:
          type: string
          format: password
          example: "123456"
        ubicacion:
          type: string
          nullable: true
          example: Quetzaltenango

    LoginRequest:
      type: object
      required:
        - telefono
        - contrasena
      properties:
        telefono:
          type: string
          example: "00000000"
        contrasena:
          type: string
          format: password
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: jwt_token
        usuario:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: Administrador AgroStore
            tipo:
              $ref: "#/components/schemas/RolUsuario"
            ubicacion:
              type: string
              nullable: true
              example: La Esperanza
            calificacion:
              type: string
              example: "5.0"

    UsuarioPerfil:
      type: object
      properties:
        id_usuario:
          type: integer
          example: 1
        nombre:
          type: string
          example: Administrador AgroStore
        telefono:
          type: string
          example: "00000000"
        tipo:
          $ref: "#/components/schemas/RolUsuario"
        ubicacion:
          type: string
          nullable: true
          example: La Esperanza
        calificacion:
          type: string
          example: "5.0"

    UsuarioAdmin:
      allOf:
        - $ref: "#/components/schemas/UsuarioPerfil"
        - type: object
          properties:
            activo:
              type: boolean
              example: true
            creado_en:
              type: string
              format: date-time
              example: "2026-05-19T10:00:00.000Z"

    ProductoRequest:
      type: object
      required:
        - nombre
        - cantidad_disponible
        - precio
        - categoria
      properties:
        nombre:
          type: string
          example: Tomate
        descripcion:
          type: string
          nullable: true
          example: Tomate fresco por libra
        cantidad_disponible:
          type: integer
          minimum: 0
          example: 50
        precio:
          type: number
          format: float
          minimum: 0.01
          example: 5
        punto_entrega:
          type: string
          nullable: true
          example: Mercado central
        categoria:
          $ref: "#/components/schemas/CategoriaProducto"

    Producto:
      type: object
      properties:
        id_producto:
          type: integer
          example: 1
        nombre:
          type: string
          example: Tomate
        descripcion:
          type: string
          nullable: true
          example: Tomate fresco por libra
        cantidad_disponible:
          type: integer
          example: 50
        precio:
          type: string
          example: "5.00"
        estado:
          $ref: "#/components/schemas/EstadoProducto"
        categoria:
          $ref: "#/components/schemas/CategoriaProducto"
        punto_entrega:
          type: string
          nullable: true
          example: Mercado central
        id_productor:
          type: integer
          example: 2
        creado_en:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"

    ProductoConProductor:
      allOf:
        - $ref: "#/components/schemas/Producto"
        - type: object
          properties:
            productor_nombre:
              type: string
              example: Juan Perez
            productor_rating:
              type: string
              example: "5.0"
            productor_ubicacion:
              type: string
              example: Quetzaltenango

    MotivoRequest:
      type: object
      required:
        - motivo
      properties:
        motivo:
          type: string
          example: Ya no necesito el producto.

    PedidoComprador:
      type: object
      properties:
        id_pedido:
          type: integer
          example: 1
        fecha:
          type: string
          format: date
          example: "2026-05-19"
        estado:
          $ref: "#/components/schemas/EstadoPedido"
        motivo_cancelacion:
          type: string
          nullable: true
          example: null
        cantidad:
          type: integer
          example: 10
        precio_unitario:
          type: string
          example: "5.00"
        producto_nombre:
          type: string
          example: Tomate
        categoria:
          $ref: "#/components/schemas/CategoriaProducto"
        punto_entrega:
          type: string
          nullable: true
          example: Mercado central
        productor_nombre:
          type: string
          example: Juan Perez
        productor_telefono:
          type: string
          example: "55551234"

    PedidoRecibido:
      type: object
      properties:
        id_pedido:
          type: integer
          example: 1
        fecha:
          type: string
          format: date
          example: "2026-05-19"
        estado:
          $ref: "#/components/schemas/EstadoPedido"
        cantidad:
          type: integer
          example: 10
        precio_unitario:
          type: string
          example: "5.00"
        producto_nombre:
          type: string
          example: Tomate
        comprador_nombre:
          type: string
          example: Maria Lopez
        comprador_telefono:
          type: string
          example: "55559876"

    PedidoAdmin:
      type: object
      properties:
        id_pedido:
          type: integer
          example: 1
        fecha:
          type: string
          format: date
          example: "2026-05-19"
        estado:
          $ref: "#/components/schemas/EstadoPedido"
        motivo_cancelacion:
          type: string
          nullable: true
          example: null
        cantidad:
          type: integer
          example: 10
        precio_unitario:
          type: string
          example: "5.00"
        producto_nombre:
          type: string
          example: Tomate
        categoria:
          $ref: "#/components/schemas/CategoriaProducto"
        comprador_nombre:
          type: string
          example: Maria Lopez
        productor_nombre:
          type: string
          example: Juan Perez

    EntregaRequest:
      type: object
      required:
        - id_pedido
        - lugar
      properties:
        id_pedido:
          type: integer
          example: 1
        fecha_entrega:
          type: string
          format: date
          nullable: true
          example: "2026-05-20"
        lugar:
          type: string
          example: Mercado central
        observaciones:
          type: string
          nullable: true
          example: Entrega acordada por la tarde.

    Entrega:
      type: object
      properties:
        id_entrega:
          type: integer
          example: 1
        fecha_entrega:
          type: string
          format: date
          nullable: true
          example: "2026-05-20"
        estado:
          $ref: "#/components/schemas/EstadoEntrega"
        lugar:
          type: string
          example: Mercado central
        observaciones:
          type: string
          nullable: true
          example: Entrega acordada por la tarde.
        id_pedido:
          type: integer
          example: 1

    EntregaProductor:
      allOf:
        - $ref: "#/components/schemas/Entrega"
        - type: object
          properties:
            id_comprador:
              type: integer
              example: 3
            cantidad:
              type: integer
              example: 10
            producto_nombre:
              type: string
              example: Tomate
            comprador_nombre:
              type: string
              example: Maria Lopez

    EntregaComprador:
      allOf:
        - $ref: "#/components/schemas/Entrega"
        - type: object
          properties:
            cantidad:
              type: integer
              example: 10
            producto_nombre:
              type: string
              example: Tomate
            productor_nombre:
              type: string
              example: Juan Perez

    EntregaAdmin:
      allOf:
        - $ref: "#/components/schemas/Entrega"
        - type: object
          properties:
            cantidad:
              type: integer
              example: 10
            producto_nombre:
              type: string
              example: Tomate
            comprador_nombre:
              type: string
              example: Maria Lopez
            productor_nombre:
              type: string
              example: Juan Perez

    Notificacion:
      type: object
      properties:
        id_notificacion:
          type: integer
          example: 1
        mensaje:
          type: string
          example: Nuevo Hortalizas: Tomate disponible en la tienda
        leida:
          type: boolean
          example: false
        fecha:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        id_usuario:
          type: integer
          example: 3

    Incumplimiento:
      type: object
      properties:
        id_incumplimiento:
          type: integer
          example: 1
        descripcion:
          type: string
          example: El producto no fue entregado en el lugar acordado.
        fecha:
          type: string
          format: date
          example: "2026-05-19"
        validado:
          type: boolean
          example: false
        id_usuario:
          type: integer
          example: 3
        id_pedido:
          type: integer
          example: 1
        reportado_por:
          type: string
          example: Maria Lopez
        tipo_reportador:
          $ref: "#/components/schemas/RolUsuario"

    ReporteVentas:
      type: object
      properties:
        productor:
          type: string
          example: Juan Perez
        total_ventas:
          type: string
          example: "5"
        total_libras:
          type: string
          example: "120"
        total_ingresos:
          type: string
          example: "600.00"

    ReporteCategorias:
      type: object
      properties:
        categoria:
          $ref: "#/components/schemas/CategoriaProducto"
        total_pedidos:
          type: string
          example: "8"
        total_libras:
          type: string
          example: "200"
        total_ingresos:
          type: string
          example: "950.00"
